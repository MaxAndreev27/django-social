name: Deploy to Fly.io

on:
  push:
    branches:
      - main  # Деплой запускатиметься автоматично при кожному пуші в гілку main

jobs:
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    concurrency: deploy-group    # Запобігає конфліктам, якщо одночасно запустити два пуші

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}